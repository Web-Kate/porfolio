<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Allyssa Kate</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fff7f9;
      --panel: rgba(255, 255, 255, 0.88);
      --primary: #dd5a84;
      --text: #2f2430;
      --muted: #6b5c67;
      --shadow: 0 20px 40px rgba(182, 94, 130, 0.18);
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffe0ea 0, transparent 34%),
        radial-gradient(circle at bottom right, #ffd7c7 0, transparent 28%),
        var(--bg);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 28px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary);
    }

    .contact-wrap {
      width: min(980px, calc(100% - 48px));
      margin: 52px auto;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    .contact-wrap span {
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .contact-wrap h1 {
      font-size: clamp(2.1rem, 4vw, 3.2rem);
      margin: 12px 0 14px;
    }

    .contact-wrap p {
      color: var(--muted);
      max-width: 640px;
      margin: 0 auto 32px;
      line-height: 1.85;
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .social-card {
      text-decoration: none;
      color: inherit;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 22px;
      padding: 24px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 12px 24px rgba(173, 96, 123, 0.12);
    }

    .social-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 28px rgba(173, 96, 123, 0.2);
    }

    .social-card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .social-card h2 {
      font-size: 1.2rem;
      margin-bottom: 6px;
    }

    .social-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    @media (max-width: 900px) {
      .social-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 70px;
        right: 20px;
        background: white;
        flex-direction: column;
        width: 200px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        border-radius: 18px;
        display: none;
      }

      .nav-links.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }

      .contact-wrap {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Allyssa</div>
    <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="experience.html">Experience</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section class="contact-wrap">
    <span>Connect With Me</span>
    <h1>Contact</h1>
    <p>You can reach me through my social media profiles for opportunities, collaboration, and professional connections.</p>

    <div class="social-grid">
      <a class="social-card" href="https://www.instagram.com/kayteeeyy/" target="_blank" rel="noopener noreferrer" aria-label="Instagram - kayteeeyy">
        <img src="instagram.png" alt="Instagram">
        <h2>Instagram</h2>
        <p>@kayteeeyy</p>
      </a>

      <a class="social-card" href="https://www.facebook.com/alisahkeyt" target="_blank" rel="noopener noreferrer" aria-label="Facebook - Allyssa Kate Eugenio">
        <img src="facebook.png" alt="Facebook">
        <h2>Facebook</h2>
        <p>Allyssa Kate Eugenio</p>
      </a>

      <a class="social-card" href="mailto:allyssabaslot09@gmail.com" aria-label="Gmail - allyssabaslot09@gmail.com">
        <img src="gmail.png" alt="Gmail">
        <h2>Gmail</h2>
        <p>allyssabaslot09@gmail.com</p>
      </a>
    </div>
  </section>

  <script>
    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("active");
    }
  </script>
</body>
</html>
